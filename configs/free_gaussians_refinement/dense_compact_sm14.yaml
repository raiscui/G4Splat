# distortion_from: 1500
# use_mip_filter: true
# use_downsample_gaussians: true
# max_init_gaussians: 1200000
# init_voxel_size: 0.01


# 减弱训练阶段的几何约束。

#   先试最简单的：

#   --dense_regul weak

#   如果还不行，甚至试：

#   --dense_regul none

#   另外配置里可以改得更温和：

#   - depth_ratio: 0.5 -> 0.2
#   - normal_consistency_from: 3500 -> 4500
#   - distortion_from: 1500 -> 2500

#   意思：

#   - 少信 depth prior
#   - 晚一点再加强法线/几何约束
