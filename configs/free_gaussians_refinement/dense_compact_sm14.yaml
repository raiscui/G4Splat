# 面向 dense-view 的小体积 preset，目标是尽量压小最终 Gaussian ply 文件。
# 主要控大小的参数：
# - `max_init_gaussians`：限制初始高斯预算上限。
# - `init_voxel_size`：值越大，初始高斯体素下采样越激进。
# - `densify_until_iter`：值越小，后期新增高斯的时间越短。
# - `densify_grad_threshold`：值越大，越不容易触发 densify。
# - `opacity_cull`：值越大，低 opacity 高斯会被更积极地删掉。

type: '2dgs'

# dense-view refine 阶段的总训练步数。
iterations: 15000

# densify 调度：
# 从第 500 步开始允许新增高斯，在第 2000 步后停止 densify。
densify_from_iter: 500
densify_until_iter: 8000

# 每 200 步做一次 densify/prune。
densification_interval: 130

# 梯度阈值越高，可被 clone/split 的高斯越少。
densify_grad_threshold: 0.00024

# 定期重置 opacity，用来稳定后续的 prune 行为。
opacity_reset_interval: 800

# opacity 剪枝阈值。值越高，弱高斯删得越狠。
opacity_cull: 0.04

# Gaussian trainer 内部用于区分 clone / split 的尺度阈值比例。
percent_dense: 0.01

# 几何与正则相关参数。
# 之前的 0.7 会让 dense render 更偏向 median depth，
# 在这类长走廊/大深度跨度场景里容易把远处“鼓”到前面来。
depth_ratio: 0.2
normal_consistency_from: 4500
distortion_from: 2000
# depth_order_schedule:
#   - [1500, 1.0]
#   - [3000, 0.1]
#   - [4500, 0.01]
#   - [6000, 0.001]


depth_order_schedule:
    - [1500, 1.0]
    - [6000, 0.3]
    - [10000, 0.1]
    - [14000, 0.03]


  # - depth_order_schedule
  #     - 管的是几何约束强弱
  #     - 它直接决定“远近关系会不会被训练后期又抹坏”
  #     - 这是更接近根因的那个旋钮
  # - mip_filter_variance
  #     - 管的是渲染时的平滑/抗锯齿强度
  #     - 值越大，远处更稳定，但更容易糊、像雾
  #     - 值越小，远处细节保留更多，但可能更噪、更闪
  #     - 它会放大或减轻“远处像雾”的视觉感受，但通常不是造成错误深度排序的主因

# 开启 mip filter，通常会让训练与渲染更稳定。
use_mip_filter: true

# mip filter 强度。值越小，远处细节保留越多；值越大，远处更稳定但更容易糊。
# mip_filter_variance: 0.2
mip_filter_variance: 0.11

# 允许在训练开始前先对初始高斯做下采样。
use_downsample_gaussians: false

# dense-view 阶段的初始高斯预算上限。
max_init_gaussians: 2000000

# 初始高斯下采样使用的体素大小。
# 调大：最终 ply 往往更小。
# 调小：保留更多细节，但高斯数和文件体积通常会上升。
init_voxel_size: 0.005

max_init_input_views: 25
init_point_stride: 1

# very low  don't remove !
#
# type: '2dgs'
