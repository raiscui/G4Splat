type: '2dgs'

# Keep the same total training budget as the compact presets so comparisons stay fair.
iterations: 7000

# Allow densification to run a bit longer so the model can recover geometry after the
# aggressive initialization downsampling used by dense-view scenes.
densify_from_iter: 500
densify_until_iter: 2600

# Run densify/prune on the same cadence as the stock configs.
densification_interval: 100

# Lower threshold than dense_compact_sm so more useful Gaussians can be cloned/split.
densify_grad_threshold: 0.0003

# Keep opacity resets frequent enough to stabilize pruning, but do not make pruning too harsh.
opacity_reset_interval: 1000
opacity_cull: 0.03

# Same split/clone scale boundary as the existing presets.
percent_dense: 0.01

# Geometry regularization.
depth_ratio: 0.5
normal_consistency_from: 3500
distortion_from: 1500

use_mip_filter: true
use_downsample_gaussians: true

# Give initialization more room than dense_compact_sm, but still stay far below the
# much heavier dense_compact preset.
max_init_gaussians: 1200000

# Slightly coarser than the small preset so initialization remains practical on dense scenes.
init_voxel_size: 0.01
